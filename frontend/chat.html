<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>InfraTick — Chat</title>
    <link rel="stylesheet" href="dashboard.css">
    <link rel="stylesheet" href="chat.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
<div class="chat-app">

    <!-- ── Sidebar ── -->
    <aside class="chat-sidebar">
        <div class="chat-sidebar-header">
            <a href="#" class="chat-back-btn" id="back-btn" title="Back to Dashboard">
                <i class="fas fa-arrow-left"></i>
            </a>
            <div class="chat-logo">
                <i class="fas fa-comments"></i>
                <span>InfraTick Chat</span>
            </div>
            <button id="theme-toggle" class="theme-toggle-btn" title="Toggle theme">
                <i class="fas fa-sun"></i>
            </button>
        </div>

        <!-- Tab switcher -->
        <div class="chat-tabs">
            <button class="chat-tab active" data-tab="private">
                <i class="fas fa-user"></i> Direct
            </button>
            <button class="chat-tab" data-tab="groups">
                <i class="fas fa-users"></i> Groups
            </button>
        </div>

        <!-- Private conversations list -->
        <div id="tab-private" class="chat-tab-content active">
            <div class="chat-list-header">
                <span>Direct Messages</span>
                <button class="chat-new-btn" id="new-dm-btn" title="New message">
                    <i class="fas fa-plus"></i>
                </button>
            </div>
            <div class="chat-list" id="dm-list">
                <div class="chat-list-empty">No conversations yet.<br>Click + to start one.</div>
            </div>
        </div>

        <!-- Groups list -->
        <div id="tab-groups" class="chat-tab-content">
            <div class="chat-list-header">
                <span>Group Chats</span>
                <button class="chat-new-btn" id="new-group-btn" title="Create group" style="display:none;">
                    <i class="fas fa-plus"></i>
                </button>
            </div>
            <div class="chat-list" id="group-list">
                <div class="chat-list-empty">No groups yet.</div>
            </div>
        </div>
    </aside>

    <!-- ── Main chat area ── -->
    <main class="chat-main">
        <!-- Empty state -->
        <div class="chat-empty-state" id="chat-empty">
            <div class="chat-empty-icon"><i class="fas fa-comments"></i></div>
            <h2>Select a conversation</h2>
            <p>Choose a direct message or group from the sidebar to start chatting.</p>
        </div>

        <!-- Active chat -->
        <div class="chat-window" id="chat-window" style="display:none;">
            <div class="chat-window-header" id="chat-header">
                <div class="chat-header-info">
                    <div class="chat-header-avatar" id="chat-avatar">?</div>
                    <div>
                        <div class="chat-header-name" id="chat-name">—</div>
                        <div class="chat-header-sub" id="chat-sub">—</div>
                    </div>
                </div>
                <div class="chat-header-actions">
                    <button class="chat-icon-btn" id="chat-info-btn" title="Info">
                        <i class="fas fa-info-circle"></i>
                    </button>
                </div>
            </div>

            <div class="chat-messages" id="chat-messages">
                <!-- Messages rendered here -->
            </div>

            <div class="chat-input-area">
                <div class="chat-input-wrap">
                    <textarea id="chat-input" placeholder="Type a message…" rows="1"></textarea>
                    <button class="chat-send-btn" id="send-btn">
                        <i class="fas fa-paper-plane"></i>
                    </button>
                </div>
            </div>
        </div>
    </main>
</div>

<!-- ── New DM Modal ── -->
<div id="new-dm-modal" class="modal">
    <div class="modal-content" style="max-width:440px;">
        <div class="modal-header">
            <h3><i class="fas fa-user" style="color:var(--accent-blue);margin-right:8px;"></i>New Direct Message</h3>
            <button class="close-btn" onclick="closeModal('new-dm-modal')">&times;</button>
        </div>
        <div class="modal-body">
            <input type="text" id="user-search" placeholder="Search by name or role…"
                style="width:100%;padding:10px 14px;background:var(--card-bg);border:1px solid var(--border-color);border-radius:8px;color:var(--text-primary);font-size:14px;margin-bottom:12px;">
            <div id="user-list" class="chat-user-picker"></div>
        </div>
    </div>
</div>

<!-- ── Create Group Modal (admin only) ── -->
<div id="create-group-modal" class="modal">
    <div class="modal-content" style="max-width:500px;">
        <div class="modal-header">
            <h3><i class="fas fa-users" style="color:var(--accent-blue);margin-right:8px;"></i>Create Group Chat</h3>
            <button class="close-btn" onclick="closeModal('create-group-modal')">&times;</button>
        </div>
        <div class="modal-body">
            <div class="form-group">
                <label>Group Name <span style="color:#ef4444;">*</span></label>
                <input type="text" id="group-name" placeholder="e.g. Incident Response Team"
                    style="width:100%;padding:10px 14px;background:var(--card-bg);border:1px solid var(--border-color);border-radius:8px;color:var(--text-primary);font-size:14px;">
            </div>
            <div class="form-group">
                <label>Description</label>
                <input type="text" id="group-desc" placeholder="Optional description"
                    style="width:100%;padding:10px 14px;background:var(--card-bg);border:1px solid var(--border-color);border-radius:8px;color:var(--text-primary);font-size:14px;">
            </div>
            <div class="form-group">
                <label>Add Members <span style="color:#ef4444;">*</span></label>
                <input type="text" id="group-member-search" placeholder="Search users…"
                    style="width:100%;padding:10px 14px;background:var(--card-bg);border:1px solid var(--border-color);border-radius:8px;color:var(--text-primary);font-size:14px;margin-bottom:10px;">
                <div id="group-member-list" class="chat-user-picker"></div>
                <div id="selected-members" class="chat-selected-members"></div>
            </div>
        </div>
        <div class="modal-footer" style="display:flex;gap:10px;">
            <button class="secondary-btn" onclick="closeModal('create-group-modal')" style="flex:1;">Cancel</button>
            <button class="primary-btn" onclick="createGroup()" style="flex:1;">
                <i class="fas fa-plus"></i> Create Group
            </button>
        </div>
    </div>
</div>

<!-- ── Group Info Modal ── -->
<div id="group-info-modal" class="modal">
    <div class="modal-content" style="max-width:420px;">
        <div class="modal-header">
            <h3 id="ginfo-name">Group Info</h3>
            <button class="close-btn" onclick="closeModal('group-info-modal')">&times;</button>
        </div>
        <div class="modal-body">
            <p id="ginfo-desc" style="color:var(--text-secondary);font-size:13px;margin-bottom:16px;"></p>
            <div style="font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:0.08em;color:var(--text-secondary);margin-bottom:10px;">Members</div>
            <div id="ginfo-members"></div>
        </div>
    </div>
</div>

<script src="js/config.js"></script>
<script src="js/theme.js"></script>
<script src="js/chat.js"></script>
</body>
</html>
